<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xbox Cloud Gaming</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    overflow: hidden;
  }

  .bg-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, #0d2f0d 0%, #000 70%);
    animation: pulseBg 3s ease-in-out infinite;
  }
  @keyframes pulseBg {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1;   }
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  .center {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    animation: fadeIn 0.6s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1);    }
  }

  .xbox-logo { width: 120px; height: 120px; }
  .xbox-logo svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 24px rgba(16,124,16,0.8));
    animation: logoGlow 2s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%, 100% { filter: drop-shadow(0 0 24px rgba(16,124,16,0.7)); }
    50%       { filter: drop-shadow(0 0 40px rgba(16,180,16,1));   }
  }

  .title-block { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .title-main  { font-size: 42px; font-weight: 600; color: #fff; letter-spacing: -0.5px; text-shadow: 0 0 40px rgba(16,124,16,0.5); }
  .title-sub   { font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; }

  .loader-wrap  { width: 280px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .loader-track { width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .loader-fill  {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #107c10, #52b043);
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(82,176,67,0.8);
    animation: loadBar 2.8s cubic-bezier(0.4,0,0.2,1) forwards;
  }
  @keyframes loadBar {
    0%   { width: 0%;   }
    30%  { width: 45%;  }
    60%  { width: 72%;  }
    85%  { width: 88%;  }
    100% { width: 100%; }
  }
  .loader-text { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="scanlines"></div>
  <div class="center">
    <div class="xbox-logo">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="g1" cx="40%" cy="35%" r="65%">
            <stop offset="0%"   stop-color="#52b043"/>
            <stop offset="60%"  stop-color="#107c10"/>
            <stop offset="100%" stop-color="#054005"/>
          </radialGradient>
          <radialGradient id="g2" cx="50%" cy="50%" r="50%">
            <stop offset="70%"  stop-color="transparent"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="48" fill="url(#g1)"/>
        <circle cx="50" cy="50" r="48" fill="url(#g2)"/>
        <text x="50" y="64" text-anchor="middle"
          font-family="'Segoe UI',Arial,sans-serif"
          font-size="52" font-weight="700"
          fill="rgba(0,0,0,0.85)">✕</text>
      </svg>
    </div>
    <div class="title-block">
      <div class="title-main">Xbox Cloud Gaming</div>
      <div class="title-sub">Cloud · Play · Stream</div>
    </div>
    <div class="loader-wrap">
      <div class="loader-track"><div class="loader-fill"></div></div>
      <div class="loader-text">Connecting…</div>
    </div>
  </div>
</body>
</html>
